name: 发布 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.1)'
        required: true
        default: 'v1.0.1'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: 发布项目 (框架依赖, 无需运行时)
        run: dotnet publish WinLinkManager.App -c Release -o publish

      - name: 打包发布文件
        run: Compress-Archive -Path publish\* -DestinationPath WinLinkManager.zip

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WinLinkManager ${{ github.event.inputs.version }}
          tag_name: ${{ github.event.inputs.version }}
          body: |
            ## 说明
            - .NET Framework 4.8 框架
            - 下载 `WinLinkManager.zip`，解压后右键 `WinLinkManager.App.exe` → 以管理员身份运行

            ## 更新内容
            - 自动构建，提交: ${{ github.sha }}
          files: WinLinkManager.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}