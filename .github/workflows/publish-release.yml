name: 发布 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.1)'
        required: true
        default: 'v1.0.1'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: 发布项目
        run: >
          dotnet publish WinLinkManager.App
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=none
          -o publish

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WinLinkManager ${{ github.event.inputs.version }}
          tag_name: ${{ github.event.inputs.version }}
          body: |
            ## 更新内容
            - 自动构建，提交: ${{ github.sha }}

            ## 使用
            下载 `WinLinkManager.App.exe`，右键 → 以管理员身份运行。
          files: publish/WinLinkManager.App.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
